<div class="ppcp payment-method"
     data-bind="css: {'_active': ( 'paypalspb_paypal' == isSelected())}, attr: {isSel: isSelected()}">
    <div class="payment-method-title field choice">
        <input type="radio" name="payment[method]" class="radio"
               data-bind="attr: {'id': getCode('paypalspb_paypal')}, value: 'paypalspb_paypal', checked: isChecked, click: selectedPayPalMethod('paypalspb_paypal'), visible: isRadioButtonVisible()" />
        <label class="label" data-bind="attr: {'for': getCode('paypalspb_paypal')}">
            <span data-bind="text: getTitleMethodPaypal()"></span>
        </label>
    </div>
    <div class="payment-method-content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() -->
        <!-- /ko -->
        <!-- /ko -->

        <div id="paypal-button-container" style="min-height: 50px;"></div>

        <!-- Additional funding source buttons -->
        <div id="paypal-paylater-container" data-bind="visible: isPayLaterEnabled()" style="min-height: 50px; margin-top: 10px;"></div>
        <div id="paypal-sepa-container" style="min-height: 50px; margin-top: 10px;"></div>
        <div id="paypal-applepay-container" style="min-height: 50px; margin-top: 10px;"></div>

        <!-- Pay Later messages widget -->
        <div id="paypal-messages-container" data-bind="visible: isPayLaterEnabled()" style="margin-top: 10px;"></div>

        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() -->
            <!-- /ko -->
            <!-- /ko -->
        </div>
        <div class="actions-toolbar">
            <div class="primary" data-bind="attr: {'id': getCode('paypalspb_paypal')}"></div>
        </div>
    </div>
</div>

<div data-bind="afterRender:completeRender() "></div>
